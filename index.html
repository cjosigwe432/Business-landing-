<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro SaaS Business App</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
* {
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body {
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f766e, #1e293b);
background-size: 400% 400%;
animation: bg 10s ease infinite;
color:white;
}

@keyframes bg {
0% {background-position:0% 50%;}
50% {background-position:100% 50%;}
100% {background-position:0% 50%;}
}

/* GLASS BOX */
.box {
width: 90%;
max-width: 420px;
padding: 25px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
border-radius: 20px;
box-shadow: 0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

input, textarea {
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

button {
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#00f2ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover {
transform: scale(1.03);
}

nav {
position:fixed;
top:0;
width:100%;
padding:15px;
background: rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
text-align:center;
font-weight:bold;
}

/* DASHBOARD */
.dashboard {
display:none;
width:100%;
padding:80px 20px;
text-align:center;
}

.card {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
padding:20px;
margin:15px auto;
border-radius:15px;
max-width:500px;
}

.hidden {display:none;}
</style>
</head>

<body>

<nav>🚀 Pro SaaS Business App</nav>

<!-- LOGIN -->
<div id="authBox" class="box">
<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="card">
<h2>Welcome to SaaS Dashboard</h2>
<p>Create and manage client orders</p>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Create Order</h3>
<input id="name" placeholder="Client Name">
<input id="business" placeholder="Business Name">
<textarea id="details" placeholder="Project Details"></textarea>
<button onclick="saveOrder()">Save Order</button>
</div>

<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>

</div>

<script>

// 🔴 FIREBASE CONFIG (PUT YOUR OWN)
const firebaseConfig = {
  apiKey: "AIzaSyDLvK-Q4v1hZ2B-mtxZzNXs5m1tCS6LdGw",
  authDomain: "neobank-app-3ebbe.firebaseapp.com",
  projectId: "neobank-app-3ebbe",
  storageBucket: "neobank-app-3ebbe.firebasestorage.app",
  messagingSenderId: "258331631270",
  appId: "1:258331631270:web:f4eeeb8ac1e3177bb21e67",
  measurementId: "G-9VRK9ZZXYS"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value, password.value)
.then(()=>alert("Account created"));
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value, password.value)
.then(()=>{
document.getElementById("authBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadOrders();
});
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// SAVE ORDER
function saveOrder(){
db.collection("orders").add({
name:name.value,
business:business.value,
details:details.value,
time:Date.now()
});
alert("Order saved!");
loadOrders();
}

// LOAD ORDERS
function loadOrders(){
let output=document.getElementById("orders");
output.innerHTML="";

db.collection("orders").orderBy("time","desc").get()
.then(snap=>{
snap.forEach(doc=>{
let d=doc.data();
output.innerHTML+=`
<div style="margin:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;">
<b>${d.name}</b><br>
${d.business}<br>
${d.details}
</div>
`;
});
});
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("authBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadOrders();
}
});

</script>

</body>
</html>
