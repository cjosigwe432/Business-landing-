<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Landing Page</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
.bg {
position:fixed;
width:100%;
height:100%;
background: url('https://images.unsplash.com/photo-1526498460520-4c246339dccb?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
filter: blur(3px) brightness(0.5);
transform: scale(1.1);
}

/* OVERLAY */
.overlay {
position:fixed;
width:100%;
height:100%;
background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,50,0.7));
}

/* MAIN */
.container {
position:relative;
z-index:2;
text-align:center;
padding:100px 20px;
animation: fadeIn 2s ease;
}

@keyframes fadeIn {
from {opacity:0; transform:translateY(20px);}
to {opacity:1; transform:translateY(0);}
}

h1 {
font-size:45px;
background: linear-gradient(90deg, #00f2ff, #ff00d4, #00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: glow 3s infinite alternate;
}

@keyframes glow {
from {filter: drop-shadow(0 0 5px #00f2ff);}
to {filter: drop-shadow(0 0 20px #ff00d4);}
}

p {
font-size:18px;
opacity:0.9;
max-width:600px;
margin:auto;
}

.btn {
display:inline-block;
margin-top:25px;
padding:14px 25px;
background:#25D366;
color:white;
border-radius:30px;
text-decoration:none;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

.btn:hover {
transform:scale(1.05);
}

/* FLOATING SHAPES */
.circle {
position:absolute;
width:80px;
height:80px;
background:rgba(0,255,255,0.3);
border-radius:50%;
animation: float 6s infinite ease-in-out;
}

.circle:nth-child(1){top:10%;left:10%;}
.circle:nth-child(2){top:70%;left:80%;}
.circle:nth-child(3){top:40%;left:50%;}

@keyframes float {
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- FLOATING EFFECT -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1>Creative Design Studio</h1>

<p>
We design modern websites, landing pages, and digital products that look like premium Photoshop UI designs — clean, bright, and high converting.
</p>

<!-- WHATSAPP BUTTON -->
<a class="btn" href="https://wa.me/2349075310374?text=Hello%20I%20want%20a%20professional%20landing%20page%20for%20my%20business" target="_blank">
💬 Message Us on WhatsApp
</a>

</div>

</body>
</html>
