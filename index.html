<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>shopify</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h1>ShopifyPro</h1>

  <input id="search" placeholder="Search products...">

  <div class="nav-right">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('clothes')">Clothes</button>
    <button onclick="filter('tech')">Tech</button>
    <button onclick="filter('shoes')">Shoes</button>
    <button onclick="openCart()">Cart (<span id="cart-count">0</span>)</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Build your dream store</h2>
  <p>Premium Shopify-style eCommerce UI</p>
</section>

<!-- PRODUCTS -->
<section id="product-list" class="grid"></section>

<!-- CART SIDEBAR -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
