<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechHub Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TechHub</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
    <button onclick="openCart()">🛒 <span id="cart-count">0</span></button>
  </nav>
</header>

<section class="hero">
  <h2>Latest Phones, Laptops & Accessories</h2>
  <p>Shop high-quality tech products at great prices</p>
</section>

<section class="products" id="product-list"></section>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button class="checkout" onclick="checkout()">Order via WhatsApp</button>
  <button class="close" onclick="closeCart()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
